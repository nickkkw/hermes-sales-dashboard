<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hermes 手碟销售日报</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --surface: #ffffff;
        --surface-soft: #f8fafb;
        --ink: #172026;
        --muted: #66727c;
        --line: #dfe5e9;
        --line-strong: #c6d0d7;
        --accent: #0f766e;
        --accent-soft: #e3f3f0;
        --good: #15803d;
        --bad: #b42318;
        --warn: #b45309;
        --shadow: 0 12px 28px rgba(23, 32, 38, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        color: var(--ink);
        background: var(--bg);
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      body {
        padding: 24px;
      }

      a {
        color: var(--accent);
        font-weight: 800;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .shell {
        max-width: 1280px;
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 24px;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--line);
      }

      .eyebrow {
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 10px 0 8px;
        font-size: 40px;
        line-height: 1.15;
        font-weight: 900;
      }

      .subhead {
        max-width: 760px;
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.7;
      }

      .status-pill {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 4px;
        padding: 8px 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface);
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin-top: 22px;
      }

      .stat {
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .stat-label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .stat-value {
        display: block;
        margin-top: 10px;
        font-size: 34px;
        line-height: 1;
        font-weight: 900;
      }

      .stat-note {
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .section {
        margin-top: 30px;
      }

      .section-header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 12px;
      }

      h2 {
        margin: 0;
        font-size: 20px;
        line-height: 1.3;
      }

      .section-copy {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .table-frame {
        overflow-x: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      table {
        width: 100%;
        min-width: 760px;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 13px 14px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
        font-size: 14px;
      }

      th {
        position: sticky;
        top: 0;
        z-index: 1;
        background: var(--surface-soft);
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      tbody tr:hover {
        background: #fbfcfd;
      }

      .numeric {
        text-align: right;
        white-space: nowrap;
      }

      .delta-up {
        color: var(--good);
        font-weight: 800;
      }

      .delta-down {
        color: var(--bad);
        font-weight: 800;
      }

      .delta-flat {
        color: var(--muted);
        font-weight: 800;
      }

      .matrix-cell {
        font-weight: 800;
      }

      .market-name {
        font-weight: 900;
      }

      .sku-heading {
        color: var(--accent);
        background: var(--accent-soft);
      }

      .sku-separator {
        border-left: 1px solid var(--line-strong);
      }

      .sku-value {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 30px;
        padding: 4px 8px;
        border-radius: 999px;
        background: var(--surface-soft);
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .sku-value-active {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 8px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
      }

      .history-entry {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .history-entry strong {
        display: block;
        font-size: 16px;
      }

      .history-entry span {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .history-link {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        padding: 9px 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--accent-soft);
      }

      .empty {
        color: var(--muted);
        font-style: italic;
      }

      .raw-layout {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        gap: 14px;
      }

      .meta-list {
        display: grid;
        gap: 10px;
      }

      .meta-item {
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
      }

      .meta-label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .meta-value {
        margin-top: 6px;
        font-size: 18px;
        font-weight: 900;
      }

      .raw-box {
        min-height: 220px;
        padding: 16px;
        border: 1px solid #0b171a;
        border-radius: 8px;
        background: #111b1f;
        color: #edf7f5;
        white-space: pre-wrap;
        line-height: 1.65;
        font-family: "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 13px;
      }

      details {
        max-width: 520px;
      }

      summary {
        cursor: pointer;
        color: var(--accent);
        font-weight: 800;
      }

      .raw-mini {
        margin-top: 10px;
        padding: 12px;
        border-radius: 8px;
        background: #111b1f;
        color: #edf7f5;
        white-space: pre-wrap;
        font-family: "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.55;
      }

      @media (max-width: 900px) {
        body {
          padding: 16px;
        }

        .topbar,
        .section-header {
          display: block;
        }

        h1 {
          font-size: 30px;
        }

        .status-pill {
          margin-top: 14px;
        }

        .summary-grid,
        .raw-layout {
          grid-template-columns: 1fr;
        }

        .history-entry {
          display: block;
        }

        .history-link {
          margin-top: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <div class="eyebrow">Hermes / 微信日报 / Netlify</div>
          <h1 id="title">手碟销售日报</h1>
          <p class="subhead" id="subtitle">每天发送的销售文本会被解析成国家、SKU 和历史记录，用于观察不同市场的销售能力。</p>
        </div>
        <div class="status-pill">
          <span class="status-dot"></span>
          <span id="statusText">等待数据</span>
        </div>
      </header>

      <section class="summary-grid" id="stats"></section>

      <section class="section">
        <div class="section-header">
          <div>
            <h2>今日国家 SKU 表现</h2>
            <p class="section-copy">每行代表一个国家，同时展示国家总量和该国家不同 SKU 的当日销量。</p>
          </div>
        </div>
        <div class="table-frame">
          <table>
            <thead>
              <tr>
                <th>国家</th>
                <th class="numeric">今日合计</th>
                <th class="numeric">昨日销量</th>
                <th class="numeric">环比</th>
                <th class="numeric">近 7 天</th>
                <th class="numeric">今日占比</th>
                <th class="numeric sku-heading sku-separator">9 音</th>
                <th class="numeric sku-heading">10 音</th>
                <th class="numeric sku-heading">12 音</th>
                <th class="numeric sku-heading">高端</th>
              </tr>
            </thead>
            <tbody id="marketSkuTable"></tbody>
          </table>
        </div>
      </section>

      <section class="section">
        <div class="section-header">
          <div>
            <h2>每日记录</h2>
            <p class="section-copy">历史记录独立成表格页，首页只保留当日看板。</p>
          </div>
        </div>
        <div class="history-entry">
          <div>
            <strong id="historySummary">正在读取历史记录</strong>
            <span>进入独立页面查看每天的总销量、国家数、SKU 拆分和原始日报。</span>
          </div>
          <a class="history-link" href="./history.html">查看每日记录</a>
        </div>
      </section>

      <section class="section">
        <div class="section-header">
          <div>
            <h2>原始日报</h2>
            <p class="section-copy">用于核对 Hermes 消息和页面解析结果是否一致。</p>
          </div>
        </div>
        <div class="raw-layout">
          <div class="meta-list" id="rawMeta"></div>
          <div class="raw-box" id="rawText"></div>
        </div>
      </section>
    </main>

    <script src="./dashboard-data.js"></script>
    <script>
      const SKU_ORDER = ["9音手碟", "10音手碟", "12音手碟", "高端手碟"];
      const MARKET_NAMES = {
        美国: "美国",
        德国: "德国",
        日本: "日本",
        西班牙: "西班牙",
        意大利: "意大利",
        法国: "法国",
        巴西: "巴西",
        墨西哥: "墨西哥",
        加拿大: "加拿大"
      };

      async function loadDashboard() {
        const response = await fetch("./data/amazon-sales.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`无法读取 data/amazon-sales.json: ${response.status}`);
        }
        const database = await response.json();
        const records = normalizeDatabase(database);
        if (!records.length) {
          throw new Error("amazon-sales.json 中没有 entries 数据。");
        }
        hydrate(records[0], records.slice(1), database.lastUpdated);
      }

      function hydrate(data, historyReports, lastUpdated) {
        const insights = buildInsights(data, historyReports);
        const dateLabel = data.reportDate || "-";

        document.title = `手碟销售日报 - ${dateLabel}`;
        document.getElementById("title").textContent = "手碟销售日报";
        document.getElementById("subtitle").textContent =
          "每天发送的销售文本会被解析成国家、SKU 和历史记录，用于观察不同市场的销售能力。";
        document.getElementById("statusText").textContent = `${dateLabel} · 已同步 ${formatDateTime(lastUpdated)}`;
        document.getElementById("rawText").textContent = data.rawText || "暂无原始日报。";

        renderStats(data, insights);
        renderMarketSkuTable(insights.countrySkuRows);
        renderHistorySummary(insights.dailyRecords);
        renderRawMeta(data, insights);
      }

      function renderStats(data, insights) {
        const summary = data.summary || {};
        const items = [
          {
            label: "今日总销量",
            value: formatValue(summary.totalSales || insights.totalSales),
            note: `数据日期 ${data.reportDate || "-"}`
          },
          {
            label: "本月累计销量",
            value: formatValue(insights.monthToDateSales),
            note: `${insights.monthLabel} 自然月累计`
          },
          {
            label: "较昨日增减",
            value: formatDelta(insights.totalDelta),
            note: insights.previousDate ? `对比 ${insights.previousDate}` : "暂无昨日记录"
          }
        ];

        document.getElementById("stats").innerHTML = items
          .map(
            (item) => `
              <article class="stat">
                <div class="stat-label">${escapeHtml(item.label)}</div>
                <span class="stat-value ${deltaClassForValue(item.label, item.value)}">${escapeHtml(item.value)}</span>
                <div class="stat-note">${escapeHtml(item.note)}</div>
              </article>
            `
          )
          .join("");
      }

      function renderMarketSkuTable(rows) {
        const target = document.getElementById("marketSkuTable");
        if (!rows.length) {
          target.innerHTML = '<tr><td colspan="10" class="empty">暂无国家 SKU 销量数据。</td></tr>';
          return;
        }

        target.innerHTML = rows
          .map(
            (row) => `
              <tr>
                <td>
                  <div class="market-name">${escapeHtml(row.label)}</div>
                </td>
                <td class="numeric">${formatValue(row.today)}</td>
                <td class="numeric">${formatValue(row.yesterday)}</td>
                <td class="numeric ${deltaClass(row.delta)}">${formatDelta(row.delta)}</td>
                <td class="numeric">${formatValue(row.last7Days)}</td>
                <td class="numeric">${formatPercent(row.share)}</td>
                ${SKU_ORDER.map((sku, index) => {
                  const value = row.values[sku] || 0;
                  const cellClass = index === 0 ? "numeric matrix-cell sku-separator" : "numeric matrix-cell";
                  const valueClass = value > 0 ? "sku-value sku-value-active" : "sku-value";
                  return `<td class="${cellClass}"><span class="${valueClass}">${formatValue(value)}</span></td>`;
                }).join("")}
              </tr>
            `
          )
          .join("");
      }

      function renderHistorySummary(records) {
        const target = document.getElementById("historySummary");
        const totalSales = records.reduce((sum, record) => sum + getTotalSales(record), 0);
        target.textContent = `已记录 ${records.length} 天，累计销量 ${formatValue(totalSales)}`;
      }

      function renderRawMeta(data, insights) {
        const items = [
          ["日报日期", data.reportDate || "-"],
          ["解析状态", insights.parseSuccessful ? "已解析" : "仅保存原文"],
          ["国家数量", formatValue(data.markets?.length || 0)],
          ["SKU 行数", formatValue(data.products?.length || 0)]
        ];

        document.getElementById("rawMeta").innerHTML = items
          .map(
            ([label, value]) => `
              <div class="meta-item">
                <div class="meta-label">${escapeHtml(label)}</div>
                <div class="meta-value">${escapeHtml(value)}</div>
              </div>
            `
          )
          .join("");
      }

      function buildInsights(data, historyReports) {
        const currentProducts = Array.isArray(data.products) ? data.products : [];
        const sortedHistory = [...historyReports].sort((a, b) => String(b.reportDate).localeCompare(String(a.reportDate)));
        const previousReport = sortedHistory[0] || null;
        const previousProducts = Array.isArray(previousReport?.products) ? previousReport.products : [];
        const records = uniqueReports([data, ...sortedHistory]);
        const last7Reports = records.slice(0, 7);
        const totalSales = sumUnits(currentProducts);
        const currentMonth = String(data.reportDate || "").slice(0, 7);
        const monthToDateSales = records
          .filter((record) => String(record.reportDate || "").startsWith(currentMonth))
          .reduce((sum, record) => sum + getTotalSales(record), 0);

        const marketToday = aggregateUnits(currentProducts, (item) => item.market || "UNKNOWN");
        const marketYesterday = aggregateUnits(previousProducts, (item) => item.market || "UNKNOWN");
        const marketLast7 = aggregateAcrossReports(last7Reports, (item) => item.market || "UNKNOWN");
        const marketKeys = new Set([...marketToday.keys(), ...marketYesterday.keys(), ...marketLast7.keys()]);
        const marketRows = [...marketKeys]
          .map((key) => {
            const today = marketToday.get(key) || 0;
            const yesterday = marketYesterday.get(key) || 0;
            return {
              key,
              label: marketLabel(key),
              today,
              yesterday,
              delta: today - yesterday,
              last7Days: marketLast7.get(key) || 0,
              share: totalSales ? today / totalSales : 0
            };
          })
          .sort((a, b) => b.today - a.today || a.label.localeCompare(b.label, "zh-CN"));

        const countrySkuRows = marketRows.map((marketRow) => {
          const values = {};
          for (const sku of SKU_ORDER) {
            values[sku] = currentProducts
              .filter((item) => (item.market || "UNKNOWN") === marketRow.key && normalizeSkuName(item.title || item.sku || "") === sku)
              .reduce((sum, item) => sum + Number(item.units || 0), 0);
          }
          return { ...marketRow, values };
        });

        return {
          totalSales,
          monthToDateSales,
          monthLabel: currentMonth || "-",
          totalDelta: totalSales - sumUnits(previousProducts),
          previousDate: previousReport?.reportDate || "",
          parseSuccessful: currentProducts.length > 0 && Array.isArray(data.markets) && data.markets.length > 0,
          marketRows,
          countrySkuRows,
          dailyRecords: records
        };
      }

      function normalizeDatabase(database) {
        return (database.entries || [])
          .map((entry) => normalizeEntry(entry))
          .sort((a, b) => String(b.reportDate).localeCompare(String(a.reportDate)));
      }

      function normalizeEntry(entry) {
        const products = [];
        const markets = [];
        const sales = entry.sales || {};

        for (const [country, skuMap] of Object.entries(sales)) {
          const countryTotal = Object.values(skuMap || {}).reduce((sum, value) => sum + Number(value || 0), 0);
          if (countryTotal > 0) {
            markets.push({
              market: country,
              sales: countryTotal,
              revenue: 0,
              currency: "USD",
              note: `${country} 销量日报`
            });
          }

          for (const [sku, units] of Object.entries(skuMap || {})) {
            if (!Number(units || 0)) {
              continue;
            }
            products.push({
              market: country,
              title: normalizeSkuName(sku),
              units: Number(units || 0),
              revenue: 0,
              price: null,
              currency: "USD",
              rank: null,
              change: "",
              url: "",
              note: `${country} ${entry.date || ""} 日报`
            });
          }
        }

        const totalSales = Number(entry.grandTotal ?? products.reduce((sum, item) => sum + Number(item.units || 0), 0));
        return {
          reportDate: entry.date,
          receivedAt: entry.receivedAt,
          rawText: entry.rawText || "",
          markets,
          products,
          summary: {
            totalSales,
            trackedProducts: products.length,
            marketCount: markets.length,
            currency: "USD"
          }
        };
      }

      function uniqueReports(reports) {
        const map = new Map();
        for (const report of reports) {
          if (!report || !report.reportDate || map.has(report.reportDate)) {
            continue;
          }
          map.set(report.reportDate, report);
        }
        return [...map.values()].sort((a, b) => String(b.reportDate).localeCompare(String(a.reportDate)));
      }

      function aggregateUnits(products, keyFn) {
        const map = new Map();
        for (const item of products) {
          const key = keyFn(item);
          map.set(key, (map.get(key) || 0) + Number(item.units || 0));
        }
        return map;
      }

      function aggregateAcrossReports(reports, keyFn) {
        const map = new Map();
        for (const report of reports) {
          for (const item of report.products || []) {
            const key = keyFn(item);
            map.set(key, (map.get(key) || 0) + Number(item.units || 0));
          }
        }
        return map;
      }

      function sumUnits(products) {
        return products.reduce((sum, item) => sum + Number(item.units || 0), 0);
      }

      function getTotalSales(report) {
        if (report.summary?.totalSales !== undefined) {
          return Number(report.summary.totalSales || 0);
        }
        return sumUnits(report.products || []);
      }

      function normalizeSkuName(value) {
        if (/高端/.test(value)) return "高端手碟";
        if (/12/.test(value)) return "12音手碟";
        if (/10/.test(value)) return "10音手碟";
        if (/9/.test(value)) return "9音手碟";
        return value || "未知 SKU";
      }

      function marketLabel(code) {
        return MARKET_NAMES[code] || code;
      }

      function formatValue(value) {
        if (value === null || value === undefined || value === "") {
          return "-";
        }
        return new Intl.NumberFormat("zh-CN").format(Number(value));
      }

      function formatDelta(value) {
        const number = Number(value || 0);
        return number > 0 ? `+${number}` : `${number}`;
      }

      function formatPercent(value) {
        return `${(Number(value || 0) * 100).toFixed(1)}%`;
      }

      function formatDateTime(value) {
        if (!value) {
          return "-";
        }
        return String(value).replace("T", " ").slice(0, 16);
      }

      function deltaClass(value) {
        const number = Number(value || 0);
        if (number > 0) return "delta-up";
        if (number < 0) return "delta-down";
        return "delta-flat";
      }

      function deltaClassForValue(label, value) {
        if (label !== "较昨日增减") return "";
        return deltaClass(Number(String(value).replace("+", "")));
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      loadDashboard().catch((error) => {
        document.getElementById("title").textContent = "页面加载失败";
        document.getElementById("subtitle").textContent = error.message;
        document.getElementById("statusText").textContent = "加载失败";
      });
    </script>
  </body>
</html>
